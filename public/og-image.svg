      <stop offset="0%" style="stop-color:#020408;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Accent shapes -->
  <circle cx="150" cy="150" r="80" fill="#0ea5e9" opacity="0.2"/>
